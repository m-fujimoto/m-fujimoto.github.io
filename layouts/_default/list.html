{{ define "main" }}
<main>
    <article>
        <header>
<h1>{{ .Type | singularize}}</h1>
        </header>
        <!-- "{{.Content}}" pulls from the markdown content of the corresponding _index.md -->
        {{.Content}}
    </article>
    <ul>
    <!-- Ranges through content/posts/*.md -->
    {{ range .Pages }}
        <li>
<a href="{{.Permalink}}">{{ .Date.Format site.Params.mydateformat }} | {{.Title}}</a> 
        </li>
    {{ end }}
    </ul>
</main>
{{ end }}
